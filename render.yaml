services:
  - type: web
    name: SurveyProduct
    env: python
    plan: free
    repo: https://github.com/he2827987/SurveyProduct
    branch: main
    region: oregon
    buildCommand: npm install --prefix frontend && cd frontend && npm run build && cd .. && pip install -r requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: "production"